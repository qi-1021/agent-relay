name: Build Go Client

on:
  push:
    paths:
      - 'main.go'
      - 'go.mod'
      - '.github/workflows/build.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      
      - name: Build for Linux
        run: GOOS=linux GOARCH=amd64 go build -o agent-client-linux main.go
      
      - name: Build for macOS
        run: GOOS=darwin GOARCH=arm64 go build -o agent-client-darwin main.go
      
      - name: Build for Windows
        run: GOOS=windows GOARCH=amd64 go build -o agent-client-windows.exe main.go
      
      - name: Set permissions
        run: chmod +x agent-client-linux agent-client-darwin
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: agent-client
          path: agent-client-*
